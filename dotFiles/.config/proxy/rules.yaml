rule-providers:
  OverseasAI:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/viewer12/OverseasAI.list/main/rule/Clash/OverseasAI/OverseasAI.list"
    path: ./ruleset/OverseasAI.yaml
    interval: 86400
proxies:
  - type: "http"
    name: "unisound_http"
    server: "127.0.0.1"
    port: 8885
  - type: "socks5"
    name: "unisound_socks5"
    server: "127.0.0.1"
    port: 1085
proxy-groups:
  - name: 选择节点
    type: select
    include-all: true
    exclude-filter: "unisound"
  - name: "Steam 登录/下载"
    type: "select"
    proxies:
      - "DIRECT"
      - "选择节点"
  - name: "Steam 商店/社区"
    type: "select"
    proxies:
      - "选择节点"
      - "DIRECT"
  - name: "☁️ OneDrive"
    type: "select"
    proxies:
      - "DIRECT"
      - "选择节点"
  - name: "unisound"
    type: "select"
    interval: 300
    timeout: 5000
    max-failed-times: 5
    lazy: true
    proxies:
      - "DIRECT"
      - "unisound_http"
      - "unisound_socks5"
  - name: "期刊网站"
    type: "select"
    interval: 300
    timeout: 5000
    max-failed-times: 5
    lazy: true
    proxies:
      - "DIRECT"
      - "选择节点"
  - name: "微软服务"
    type: "select"
    proxies:
      - "选择节点"
      - "DIRECT"
  - name: "苹果服务"
    type: "select"
    proxies:
      - "DIRECT"
      - "选择节点"
  - name: 国内网站
    type: select
    proxies:
      - DIRECT
      - 选择节点
  - name: 拦截广告
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 选择节点
  - name: 漏网之鱼
    type: select
    proxies:
      - 选择节点
      - DIRECT
  - name: 爱奇艺&哔哩哔哩
    type: select
    include-all: true
    filter: "(?i)港|hk|hongkong|hong kong|台湾|tw|台灣"
    exclude-filter: "unisound"
    proxies:
      - DIRECT
  - name: 动画疯
    type: select
    include-all: true
    filter: "(?i)港|hk|hongkong|hong kong|台湾|tw|台灣"
    exclude-filter: "unisound"
  - name: OverseasAI
    type: select
    include-all: true
    exclude-filter: "unisound"
