proxies:
  - type: "http"
    name: "unisound_http"
    server: "127.0.0.1"
    port: 8885
  - type: "socks5"
    name: "unisound_socks5"
    server: "127.0.0.1"
    port: 1085
proxy-groups:
  - name: 🔰 选择节点
    type: select
    proxies:
      - DIRECT
  - name: "🎮 Steam 登录/下载"
    type: "select"
    proxies:
      - "DIRECT"
      - "🔰 选择节点"
  - name: "🎮 Steam 商店/社区"
    type: "select"
    proxies:
      - "🔰 选择节点"
      - "DIRECT"
  - name: "☁️ OneDrive"
    type: "select"
    proxies:
      - "DIRECT"
      - "🔰 选择节点"
  - type: "select"
    name: "unisound"
    interval: 300
    timeout: 5000
    max-failed-times: 5
    lazy: true
    proxies:
      - "DIRECT"
      - "unisound_http"
      - "unisound_socks5"
  - type: "select"
    name: "📰 期刊网站"
    interval: 300
    timeout: 5000
    max-failed-times: 5
    lazy: true
    proxies:
      - "DIRECT"
      - "🔰 选择节点"
  - name: "Ⓜ️ 微软服务"
    type: "select"
    proxies:
      - "🔰 选择节点"
      - "DIRECT"
  - name: "🍎 苹果服务"
    type: "select"
    proxies:
      - "DIRECT"
      - "🔰 选择节点"
